  CRACK_REGIME:            cracks/chart_04_regime
  CRACK_MED_VS_NWE:        cracks/chart_05_med_vs_nwe
  CRACK_ALL_SLATES:        cracks/chart_06_all_slates
  CRACK_SEASONAL:          cracks/chart_07_seasonal
  # Fundamentals
  STOCKS_US:               fundamentals/chart_01_us_stocks
  STOCKS_SPR:              fundamentals/chart_02_spr_drawdown
  STOCKS_EU_VS_US:         fundamentals/chart_03_eu_vs_us_stocks
  REFINERY_UTIL:           fundamentals/chart_04_refinery_util
  FLOATING_STORAGE:        fundamentals/chart_05_floating_storage
  STOCKS_CRACK_CORR:       fundamentals/chart_06_stocks_crack_correlation
  STOCKS_EU_BY_COUNTRY:    fundamentals/chart_07_eu_stocks_by_country
  # Refining additions (EIA long-history + EU supply transformation)
  US_UTIL_LONG:            fundamentals/chart_08_us_util_long
  US_YIELDS:               fundamentals/chart_09_us_yields
  EU_REFINERY_INTAKE:      fundamentals/chart_10_eu_refinery_intake
  EU_DISTIL_VS_CRACK:      fundamentals/chart_11_eu_distillate_vs_crack
  EU_CONSUMPTION:          fundamentals/chart_12_eu_consumption_vs_output
  EU_CONSUMPTION_ANNUAL:   fundamentals/chart_13_eu_consumption_annual
  EU_JET_CONSUMPTION:      fundamentals/chart_14_eu_jet_consumption
  BRENT_THREE_TRACKS:      cracks/chart_12_brent_three_tracks
  CRACK_ROLL_HEDGE:        cracks/chart_09_rolling_hedge_ratio
  CRACK_ROLL_HEDGE_REGIME: cracks/chart_09b_rolling_hedge_ratio_by_regime
  CRACK_HMM_REGIME:        cracks/chart_10_hmm_regime
  CRACK_SEASONAL_CI:       cracks/chart_11_seasonal_bootstrap_ci
  # Regional
  MED_NWE_INTEGRATION:     regional/chart_01_med_nwe_integration
  BRENT_WTI_SPREAD:        regional/chart_02_brent_wti_spread
  EURUSD_IMPACT:           regional/chart_03_eurusd_impact
  RUSSIA_EXPORT:           regional/chart_04_russia_export
  EUROPE_IMPORT_MIX:       regional/chart_05_europe_import_mix
  DIESEL_GAS_PREMIUM:      regional/chart_06_diesel_gas_premium
  # OPEC ASB additions (global trade flows + freight)
  OPEC_TRADE_FLOWS:        regional/chart_07_opec_trade_flows
  OPEC_TANKER_FREIGHT:     regional/chart_08_opec_tanker_freight
  # Cracks cross-check (OPEC ASB T76)
