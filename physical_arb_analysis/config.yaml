PATHS:
  FIGURES:     outputs/figures
  REPORTS:     outputs/reports
  MAJOR_DATES: ../major_dates.yaml

# =============================================================================
# Run metadata — when were the prices taken and under which market regime.
# The model is NOT live. These are the dates the user should cite when
# presenting results.
# =============================================================================
RUN_METADATA:
  DATE_OF_PRICES: "2026-04-24"
  REGIME:         "Crisis — Hormuz blockade cycle, peace-talks phase"
  REGIME_NOTE:    "Apr 24, 2026: US-Iran ceasefire fragile. Witkoff/Kushner
                   dispatched to Pakistan Apr 25 to meet Iranian FM Araghchi.
                   Hormuz transits at 7/day (vs ~30 normal); Iranian-port
                   blockade enforced since Apr 13. ~10% global oil supply
                   disrupted (Baker Hughes / SLB Q1 calls). Brent backwardation
                   $5.93/b M1-M2; LSGO M1-M2 $91/mt. EU adopted 20th Russia
                   sanctions package Apr 23 (banning Murmansk/Tuapse + Karimun).
                   Read all numbers below in this acute regime; freight WS 2-4x
                   historical averages on most dirty routes (OPEC ASB T62)."

ANALYSIS:
  SOFR_BPS:                515         # approximate Apr-26 SOFR
  TRADER_SPREAD_BPS:       300         # IG-rated physical trader credit over SOFR
  DEFAULT_LAYCAN_DAYS:     5           # pre-load laytime window
  DEFAULT_DEMURRAGE_DAYS:  2           # risk-weighted assumed delay
  INSURANCE_BPS_PER_VOYAGE: 25         # P&I + H&M (war-risk adds separately)
  BROKER_COMMISSION_BPS:   250         # 2.5% of freight — ship-broking + chartering standard

# =============================================================================
# VESSEL SPECS — nameplate DWT (kdwt), service (clean/dirty), laden speed (kt),
# port-stay days (load + discharge). Speeds are ballpark — owners run eco-speed
# in weak markets (down to 11-12 kt), full-speed in tight markets (up to 15 kt).
# =============================================================================
VESSEL_SPECS:
  MR:      {dwt_kt: 40,  service: clean, laden_speed_kt: 14.0, days_load_disch: 2.0}
  LR1:     {dwt_kt: 55,  service: clean, laden_speed_kt: 14.0, days_load_disch: 2.5}
  LR2:     {dwt_kt: 75,  service: clean, laden_speed_kt: 14.0, days_load_disch: 3.0}
  Aframax: {dwt_kt: 80,  service: dirty, laden_speed_kt: 13.0, days_load_disch: 3.0}
  Suezmax: {dwt_kt: 140, service: dirty, laden_speed_kt: 13.0, days_load_disch: 3.5}
  VLCC:    {dwt_kt: 270, service: dirty, laden_speed_kt: 13.0, days_load_disch: 4.0}

# =============================================================================
# GRADE SPECS — density is barrels per metric tonne (used for USD/MT ↔ USD/bbl).
# Sources: API gravity standard tables, Platts product specs.
# =============================================================================
GRADE_SPECS:
  # Crudes — heavier = fewer barrels per tonne
  Urals:        {density: 7.22, api: 31.0, sulfur_pct: 1.30}
  Forties:      {density: 7.44, api: 38.0, sulfur_pct: 0.60}
  Bonny_Light:  {density: 7.32, api: 33.4, sulfur_pct: 0.13}
  WTI_Midland:  {density: 7.57, api: 39.5, sulfur_pct: 0.30}
  Dated_Brent:  {density: 7.44, api: 38.0, sulfur_pct: 0.45}
  Arab_Medium:  {density: 7.22, api: 31.0, sulfur_pct: 2.40}
  # Refined products
  ULSD:         {density: 7.45, api: 35.0, sulfur_pct: 0.001}
  Jet:          {density: 7.90, api: 42.0, sulfur_pct: 0.30}
  EBOB:         {density: 8.33, api: 58.0, sulfur_pct: 0.01}
  Gasoil_01:    {density: 7.45, api: 34.0, sulfur_pct: 0.10}
  FO_35:        {density: 6.35, api: 11.0, sulfur_pct: 3.50}

# =============================================================================
# FORWARD PRICES — date-stamped reference levels used as engine defaults.
# Not live. User should cite DATE_OF_PRICES when presenting.
# Source: Platts Asia-Pacific/AG · European · US Marketscan · Oilgram News
#         all dated 24 April 2026.
# =============================================================================
FORWARD_PRICES_USD_BBL:
  # ICE Brent forwards (Jun/Jul/Aug-26 contracts) — Apr 24 ICE settles
  Brent_M1_Jun26:        105.33         # ICE Brent Jun26 settle (US Marketscan p.17)
  Brent_M2_Jul26:         99.13         # ICE Brent Jul26 settle
  Brent_M3_Aug26:         94.28         # ICE Brent Aug26 settle
  Dated_Brent:           110.37         # ≈ Brent M1 + Dated diff $5.035/b (European Marketscan p.20; off 73.85% from Apr 13 peak)
  # NYMEX WTI forwards (Apr 24 settles)
  WTI_M1_Jun26:           94.40         # NYMEX WTI Jun26 settle
  WTI_M2_Jul26:           89.58         # NYMEX WTI Jul26 settle
  # ICE LSGO forwards (USD/MT in source; converted via density 7.45)
  LSGO_M1_May26_bbl:     167.65         # 1249.00 / 7.45 (ICE LSGO May26 settle)
  LSGO_M2_Jun26_bbl:     155.44         # 1158.00 / 7.45 (ICE LSGO Jun26 settle)
  # Product CIF/FOB physical (Apr 24 European Marketscan)
  ULSD_CIF_Med_bbl:      175.57         # AAWYZ00 1308.00 / 7.45 (Genova/Lavera CIF)
  ULSD_CIF_NWE_bbl:      173.49         # AAVBG00 1292.50 / 7.45 (basis ARA CIF)
  ULSD_FOB_ARA_bbl:      170.34         # AAJUS00 1269.00 / 7.45 (FOB barge)
  # USGC ULSD now anchored to live FOB cargo print (placeholder retired).
  # Source: AAXRV00 Export ULSD FOB cargo, US Marketscan Apr 24 p.3.
  ULSD_FOB_USGC_bbl:     150.47         # AAXRV00 358.26 ¢/gal × 42 = $150.47/b
  Jet_CIF_Med_bbl:       195.79         # AAZBN00 1546.75 / 7.90 (Genova/Lavera CIF)
  Jet_CIF_NWE_bbl:       195.98         # PJAAU00 1548.25 / 7.90 (basis ARA CIF)
  EBOB_FOB_ARA_bbl:      128.66         # AAQZV00 1071.75 / 8.33 (Rotterdam barge)
  # NO default Urals discount. Large structural discounts on Russian-origin
  # crude (e.g. -$15 to -$30 vs Dated Brent through 2022-2025) are real but
  # are accessible only to trading houses with established Russian-flow
  # operations and price-cap compliance carve-outs. A generic G7-linked desk
  # pays a much narrower differential, often near zero. Default this to 0
  # and set the value explicitly when a specific commercial agreement justifies it.
  Urals_FOB_Novo_diff:   0.00           # default 0 — set explicitly when commercial-basis-justified

