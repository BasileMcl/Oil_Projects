  LR1:     32000
  LR2:     42000
  Aframax: 40000
  Suezmax: 55000
  VLCC:    80000

# =============================================================================
# PRESETS — named defaults for quick instantiation; all parameters can be
# overridden at construction. Useful for notebook readability.
# =============================================================================
PRESETS:
  USG_NWE_ULSD:
    origin_port:     Houston
    dest_port:       Rotterdam
    vessel:          MR
    grade:           ULSD
    ws_flat_key:     TC2_USG_Continent
    canals:          []
    # Default product/month lookup keys, resolved by CargoArb against
    # FORWARD_PRICES_USD_BBL. User can still override buy_price / sell_price
    # explicitly if desired.
    buy_product:     ULSD
    buy_month:       FOB_USGC
    sell_product:    ULSD
    sell_month:      CIF_NWE
    description:     "DEFAULT — product cargo: USGC ULSD into ARA. G7-compliant, the lane the chartbook discusses."

  USG_NWE_AFRA:
    origin_port:     Houston
    dest_port:       Rotterdam
    vessel:          Aframax
    grade:           WTI_Midland
    ws_flat_key:     TD22_USG_Rotterdam
    canals:          []
    buy_product:     WTI
    buy_month:       M1
    sell_product:    Brent
    sell_month:      M2
    description:     "Post-2015 export-ban US crude to Europe — trans-Atlantic basin (crude leg)"

  MED_NWE_LR2:
    origin_port:     Augusta
    dest_port:       Rotterdam
    vessel:          LR2
    grade:           ULSD
    ws_flat_key:     TC6_Cross_Med
    canals:          []
    buy_product:     ULSD
    buy_month:       CIF_Med
    sell_product:    ULSD
    sell_month:      CIF_NWE
    description:     "Product cargo: Med ULSD into ARA. Currently inverted (Med CIF > NWE CIF) — use to show the flip."

  WAF_ASIA_VLCC:
    origin_port:     Bonny
    dest_port:       Qingdao
    vessel:          VLCC
    grade:           Bonny_Light
    ws_flat_key:     TD3C_ME_East     # proxy; route-specific flat lives in WS book
    canals:          [Cape_Good_Hope]
    buy_product:     Brent
    buy_month:       M1
    sell_product:    Brent
    sell_month:      M2
    description:     "WAF → Asia long-haul crude (Cape-routed post-2024)"

  # --- Compliance-gated presets (G7 participants cannot execute; keep for
  #     scenario analysis, historical backtests, and non-G7 counterparty work)
  BSEA_MED_AFRA:
    origin_port:     Novorossiysk
    dest_port:       Augusta
    vessel:          Aframax
    grade:           Urals
    ws_flat_key:     TD6_BSea_Med_Aframax
    canals:          [Bosphorus]
    buy_product:     Brent
    buy_month:       M1
    sell_product:    Brent
    sell_month:      M2
    description:     "COMPLIANCE-GATED for G7 parties. Scenario-only. Black Sea → Med Aframax, Russian Urals (Brent-priced base, broker discount applied via buy_premium_discount)."

  BSEA_MED_SUEZ:
    origin_port:     Novorossiysk
    dest_port:       Augusta
    vessel:          Suezmax
    grade:           Urals
    ws_flat_key:     TD6_BSea_Med
    canals:          [Bosphorus]
    buy_product:     Brent
    buy_month:       M1
    sell_product:    Brent
    sell_month:      M2
    description:     "COMPLIANCE-GATED. Scenario-only. Black Sea → Med Suezmax (larger parcel)."

