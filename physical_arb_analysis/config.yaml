# =============================================================================
# WORLDSCALE FLAT RATES 2026 — USD/MT at WS 100 for canonical routes.
# These are the Worldscale Association published flat rates; user should
# verify against the current Worldscale book for their specific route/vessel
# combination. When the user passes flat_rate= explicitly to CargoArb, the
# value below is bypassed.
# =============================================================================
WS_FLAT_RATES_2026:
  TD6_BSea_Med:           11.09   # Suezmax Novorossiysk → Augusta
  TD6_BSea_Med_Aframax:   11.20   # Aframax variant on same lane (indicative)
  TD3C_ME_East:            8.47   # VLCC AG → China
  TD20_WAF_UKC:           15.27   # Suezmax WAF → Rotterdam
  TD22_USG_Rotterdam:     12.18   # Aframax Houston → Rotterdam
  TD25_USG_Caribs:         7.25   # Aframax USG → Caribs
  TC6_Cross_Med:          16.85   # MR cross-Med clean
  TC17_BSea_Med_Clean:    22.13   # MR Black Sea → Med clean (diesel)
  TC2_ARA_USAC:           28.43   # MR ARA → USAC gasoline
  TC2_USG_Continent:      24.50   # MR USGC → ARA (clean products — diesel, gasoline)
  TC5_ME_Japan:           22.50   # LR1 ME → Japan clean

