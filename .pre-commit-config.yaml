# Pre-commit hooks. Run automatically on every `git commit` and `git push`.
# Bypass in true emergency only with: git commit --no-verify / git push --no-verify
#
# To enable on a fresh clone:
#   pre-commit install --install-hooks --hook-type pre-commit --hook-type pre-push

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=5000]
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # Local hook: invoke our custom pre-push audit script (.githooks/pre-push)
  # Runs only on `git push`, scans for Platts data leaks, secrets, large files.
  - repo: local
    hooks:
      - id: oil-projects-pre-push-audit
        name: Oil_Projects pre-push audit (Platts/secrets/data)
        entry: bash .githooks/pre-push
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
        verbose: true
